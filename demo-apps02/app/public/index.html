<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Bocil Resto</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Gourmet Restaurant</h1>
            <p class="subtitle">Fine Dining Experience</p>
        </header>

        <div class="status-bar">
            <span id="status">Loading menu...</span>
        </div>

        <main id="menu-container">
            <!-- Menu will be loaded here -->
        </main>

        <footer>
            <p>Built with ❤️ | API: <a href="/api/menu">/api/menu</a> | Health: <a href="/health">/health</a></p>
        </footer>
    </div>

    <script>
        async function loadMenu() {
            const container = document.getElementById('menu-container');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch('/api/menu');
                const result = await response.json();
                
                if (result.success) {
                    status.textContent = `Loaded ${result.count} categories`;
                    status.className = 'success';
                    
                    container.innerHTML = result.data.categories.map(cat => `
                        <section class="category">
                            <h2>${cat.name}</h2>
                            <div class="items">
                                ${cat.items.map(item => `
                                    <div class="item-card">
                                        <div class="item-header">
                                            <h3>${item.name}</h3>
                                            <span class="price">$${item.price}</span>
                                        </div>
                                        <p class="description">${item.description}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    `).join('');
                }
            } catch (error) {
                status.textContent = 'Error loading menu';
                status.className = 'error';
                console.error('Failed to load menu:', error);
            }
        }

        loadMenu();
    </script>
</body>
</html>
